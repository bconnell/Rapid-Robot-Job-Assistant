<!doctype html>
<html>
  <body>
    <form>
      <fieldset>
        <legend>Work eligibility</legend>
        <label for="auth">Are you authorized to work in the United States?</label>
        <select id="auth" name="work_authorization">
          <option>Yes</option>
          <option>No</option>
        </select>
        <label for="sponsor">Will you now or in the future require sponsorship?</label>
        <select id="sponsor" name="visa_sponsorship">
          <option>No</option>
          <option>Yes</option>
        </select>
      </fieldset>
      <label for="resume">Resume upload</label>
      <input id="resume" name="resume_file" type="file" />
      <label for="start">Earliest start date</label>
      <input id="start" name="start_date" />
    </form>
  </body>
</html>
