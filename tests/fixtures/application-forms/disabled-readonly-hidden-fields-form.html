<!doctype html>
<html>
  <body>
    <form aria-label="Northstar Careers locked fields">
      <label for="disabled-email">Email address</label>
      <input id="disabled-email" name="email" type="email" disabled />
      <label for="readonly-phone">Phone number</label>
      <input id="readonly-phone" name="phone" type="tel" readonly />
      <label for="hidden-city">City</label>
      <input id="hidden-city" name="city" style="display: none" />
      <label for="statement">Personal statement</label>
      <textarea id="statement" name="personalStatement"></textarea>
    </form>
  </body>
</html>
