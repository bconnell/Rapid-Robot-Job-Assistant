<!doctype html>
<html>
  <body>
    <form aria-label="Prairie Apply eligibility">
      <fieldset>
        <legend>Are you legally authorized to work in the United States?</legend>
        <label><input type="radio" name="workAuth" value="yes" /> Yes</label>
        <label><input type="radio" name="workAuth" value="no" /> No</label>
      </fieldset>
      <fieldset>
        <legend>Will you now or in the future require visa sponsorship?</legend>
        <label><input type="radio" name="sponsorship" value="yes" /> Yes</label>
        <label><input type="radio" name="sponsorship" value="no" /> No</label>
      </fieldset>
      <fieldset>
        <legend>Preferred work location</legend>
        <label><input type="checkbox" name="workLocation" value="remote" /> Remote</label>
        <label><input type="checkbox" name="workLocation" value="hybrid" /> Hybrid</label>
        <label><input type="checkbox" name="workLocation" value="onsite" /> Onsite</label>
      </fieldset>
    </form>
  </body>
</html>
