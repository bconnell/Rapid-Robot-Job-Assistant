<!doctype html>
<html>
  <body>
    <form aria-label="Voluntary disclosures">
      <fieldset>
        <legend>Voluntary demographic information</legend>
        <label for="gender">Gender identity</label>
        <select id="gender" name="gender">
          <option value="">Select</option>
          <option value="decline">I do not wish to answer</option>
        </select>
        <label for="race">Race</label>
        <select id="race" name="race">
          <option value="">Select</option>
          <option value="decline">I do not wish to answer</option>
        </select>
      </fieldset>
      <fieldset>
        <legend>Disability self-identification</legend>
        <label><input type="radio" name="disability" value="yes" /> Yes</label>
        <label><input type="radio" name="disability" value="no" /> No</label>
      </fieldset>
      <fieldset>
        <legend>Veteran status</legend>
        <label><input type="radio" name="veteran" value="yes" /> Yes</label>
        <label><input type="radio" name="veteran" value="no" /> No</label>
      </fieldset>
    </form>
  </body>
</html>
