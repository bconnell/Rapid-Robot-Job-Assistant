<!doctype html>
<html>
  <body>
    <form aria-label="Riverbend Talent Portal">
      <label id="degree-label">Highest degree completed</label>
      <button
        type="button"
        role="combobox"
        aria-labelledby="degree-label"
        aria-haspopup="listbox"
        aria-expanded="false"
        data-testid="degree-picker"
      >
        Select degree
      </button>
      <div role="listbox">
        <div role="option">Bachelor's degree</div>
        <div role="option">Master's degree</div>
      </div>
    </form>
  </body>
</html>
